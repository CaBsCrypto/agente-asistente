<svg xmlns="http://www.w3.org/2000/svg" width="1536" height="864" viewBox="0 0 1536 864" role="img" aria-labelledby="title desc">
  <title id="title">Carmelita — Knows you. Acts for you.</title>
  <desc id="desc">A light, warm brand cover for Carmelita showing a controlled action flow from Ask to Review to Execute to Evidence.</desc>

  <defs>
    <linearGradient id="paperGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFDF8"/>
      <stop offset="0.56" stop-color="#F7F2E8"/>
      <stop offset="1" stop-color="#FFF4D8"/>
    </linearGradient>
    <linearGradient id="forestDepth" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#214D40"/>
      <stop offset="1" stop-color="#153F32"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#153F32" flood-opacity="0.10"/>
    </filter>
    <filter id="cardShadow" x="-20%" y="-20%" width="150%" height="160%">
      <feDropShadow dx="8" dy="10" stdDeviation="0" flood-color="#DED6C6" flood-opacity="1"/>
    </filter>
  </defs>

  <!-- Canvas -->
  <rect width="1536" height="864" fill="url(#paperGlow)"/>
  <circle cx="136" cy="102" r="250" fill="#FFF4D8" opacity="0.88"/>
  <circle cx="1462" cy="756" r="310" fill="#DCEADF" opacity="0.75"/>
  <path d="M1122 0h414v272l-78-29-70 31-75-49-90 20-101-65Z" fill="#F2B544" opacity="0.08"/>

  <!-- Faceted background detail -->
  <g fill="none" stroke="#DDD7CA" stroke-width="2" opacity="0.58">
    <path d="M1302 78l88-46 84 55 1 100-88 45-84-55Z"/>
    <path d="M1302 78l85 154 3-200m84 55-171 90m87-145 85 155"/>
    <path d="M52 658l86-45 84 55 1 98-88 46-83-55Z"/>
    <path d="M52 658l83 154 3-199m84 55-170 89m86-144 85 153"/>
  </g>

  <!-- Header brand -->
  <g transform="translate(92 72)">
    <g>
      <path fill="#153F32" d="M18 0h28l18 18v28L46 64H18L0 46V18L18 0Z"/>
      <path fill="none" stroke="#FF5B3A" stroke-linecap="round" stroke-width="8" d="M42.5 20.5a17 17 0 1 0 0 23"/>
      <circle cx="46" cy="32" r="5" fill="#F2B544"/>
    </g>
    <text x="84" y="46" fill="#20211E" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="40" font-weight="800" letter-spacing="-1.6">Carmelita</text>
  </g>

  <g transform="translate(92 230)">
    <text fill="#DB3F22" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="17" font-weight="700" letter-spacing="2.6">PERSONAL EXECUTION AGENT</text>
    <text y="89" fill="#20211E" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="76" font-weight="820" letter-spacing="-4.4">Knows you.</text>
    <text y="169" fill="#153F32" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="76" font-weight="820" letter-spacing="-4.4">Acts for you.</text>
    <rect y="207" width="720" height="1" fill="#DDD7CA"/>
    <text y="256" fill="#66685F" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="24" font-weight="600" letter-spacing="0.1">Memory · Permissions · Wallet · Real-world actions</text>
  </g>

  <!-- Controlled execution preview -->
  <g transform="translate(912 178)" filter="url(#softShadow)">
    <rect width="520" height="410" rx="34" fill="url(#forestDepth)" stroke="#0D3025" stroke-width="2"/>
    <g transform="translate(34 30)">
      <circle cx="9" cy="9" r="8" fill="#45B77A"/>
      <text x="30" y="15" fill="#FFFFFF" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="17" font-weight="750">Carmelita is ready</text>
      <rect x="330" width="122" height="27" rx="14" fill="#F2B544"/>
      <text x="391" y="18" text-anchor="middle" fill="#153F32" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="11" font-weight="800" letter-spacing="1">WITHIN RULES</text>
    </g>
    <line x1="34" y1="78" x2="486" y2="78" stroke="#477064"/>

    <g transform="translate(34 105)">
      <text fill="#B7C8C1" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="12" font-weight="700" letter-spacing="1.2">PREPARED ACTION</text>
      <text y="44" fill="#FFFFFF" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="26" font-weight="750">Book a workspace for Friday</text>

      <g transform="translate(0 78)">
        <rect width="452" height="92" rx="18" fill="#214D40" stroke="#477064"/>
        <text x="20" y="30" fill="#9FB9AF" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="13">Service</text>
        <text x="432" y="30" text-anchor="end" fill="#FFFFFF" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="14" font-weight="750">UNBLCK</text>
        <text x="20" y="66" fill="#9FB9AF" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="13">Policy</text>
        <text x="432" y="66" text-anchor="end" fill="#F2B544" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="14" font-weight="750">Approval required</text>
      </g>

      <g transform="translate(0 194)">
        <rect width="452" height="62" rx="31" fill="#FF5B3A"/>
        <rect y="53" width="452" height="9" rx="5" fill="#DB3F22"/>
        <text x="226" y="39" text-anchor="middle" fill="#FFFFFF" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="17" font-weight="800">Review and approve →</text>
      </g>
    </g>
  </g>

  <!-- Flow rail -->
  <g transform="translate(92 667)">
    <text fill="#153F32" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="13" font-weight="800" letter-spacing="1.6">CONTROLLED ACTION FLOW</text>
    <g transform="translate(0 36)" filter="url(#cardShadow)">
      <rect width="1352" height="92" rx="24" fill="#FFFDF8" stroke="#DDD7CA"/>
    </g>

    <g transform="translate(29 57)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif">
      <g>
        <circle cx="24" cy="24" r="24" fill="#FFF4D8" stroke="#F2B544"/>
        <text x="24" y="30" text-anchor="middle" fill="#153F32" font-size="16" font-weight="850">01</text>
        <text x="67" y="31" fill="#20211E" font-size="20" font-weight="800">Ask</text>
      </g>
      <g transform="translate(280)">
        <path d="M-60 24H-8" stroke="#C6C0B5" stroke-width="2"/>
        <path d="m-14 18 7 6-7 6" fill="none" stroke="#C6C0B5" stroke-width="2"/>
        <circle cx="24" cy="24" r="24" fill="#DCEADF" stroke="#9FB9AF"/>
        <text x="24" y="30" text-anchor="middle" fill="#153F32" font-size="16" font-weight="850">02</text>
        <text x="67" y="31" fill="#20211E" font-size="20" font-weight="800">Review</text>
      </g>
      <g transform="translate(590)">
        <path d="M-60 24H-8" stroke="#C6C0B5" stroke-width="2"/>
        <path d="m-14 18 7 6-7 6" fill="none" stroke="#C6C0B5" stroke-width="2"/>
        <circle cx="24" cy="24" r="24" fill="#FFE1D9" stroke="#FF5B3A"/>
        <text x="24" y="30" text-anchor="middle" fill="#DB3F22" font-size="16" font-weight="850">03</text>
        <text x="67" y="31" fill="#20211E" font-size="20" font-weight="800">Execute</text>
      </g>
      <g transform="translate(920)">
        <path d="M-60 24H-8" stroke="#C6C0B5" stroke-width="2"/>
        <path d="m-14 18 7 6-7 6" fill="none" stroke="#C6C0B5" stroke-width="2"/>
        <circle cx="24" cy="24" r="24" fill="#153F32"/>
        <path d="m13 24 7 7 15-16" fill="none" stroke="#F2B544" stroke-linecap="round" stroke-linejoin="round" stroke-width="4"/>
        <text x="67" y="31" fill="#20211E" font-size="20" font-weight="800">Evidence</text>
      </g>
    </g>
  </g>

  <!-- Footer signal -->
  <g transform="translate(1200 812)">
    <circle cx="8" cy="-5" r="7" fill="#45B77A"/>
    <text x="25" fill="#66685F" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="12" font-weight="700" letter-spacing="1.2">USER-OWNED · AUDITABLE</text>
  </g>
</svg>
