[mcp_servers.graphify]
enabled = true
required = false
command = "graphify-mcp"
args = ["graphify-out/graph.json"]
startup_timeout_sec = 20.0
tool_timeout_sec = 60.0
enabled_tools = [
  "query_graph",
  "get_node",
  "get_neighbors",
  "shortest_path",
  "get_community",
  "god_nodes",
  "graph_stats",
  "list_prs",
  "get_pr_impact",
  "triage_prs",
]
